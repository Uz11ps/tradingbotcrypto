services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cryptoarbi}
      POSTGRES_USER: ${POSTGRES_USER:-cryptoarbi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptoarbi}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptoarbi}:${POSTGRES_PASSWORD:-cryptoarbi}@postgres:5432/${POSTGRES_DB:-cryptoarbi}
      REDIS_URL: redis://redis:6379/0
      API_HOST: 0.0.0.0
      API_PORT: 8000
    command: python -m app.api.main
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      API_PUBLIC_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
    command: python -m app.bot.main
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  signal_worker:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      API_PUBLIC_BASE_URL: http://api:8000
      WORKER_SHARD_INDEX: ${WORKER_SHARD_INDEX:--1}
      WORKER_SHARD_COUNT: ${WORKER_SHARD_COUNT:-5}
      SIGNAL_DEBUG_FULL_ENABLED: ${SIGNAL_DEBUG_FULL_ENABLED:-false}
    command: python -m app.workers.mock_signal_worker
    depends_on:
      api:
        condition: service_started
    profiles: ["worker"]
    restart: unless-stopped

volumes:
  postgres_data:

